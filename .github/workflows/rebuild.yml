name: Rebuild Dashboard

on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 BRT (UTC-3) — após Data Suite terminar
  workflow_dispatch:         # também permite rodar manualmente a qualquer hora

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery pyarrow

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Rebuild dashboard HTML
        run: python rebuild_dash.py
        env:
          BQ_PROJECT: ddme000725-g9rtvpqr28z-furyid

      - name: Commit updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: rebuild dashboard $(date -u +'%Y-%m-%d')"
          git push
